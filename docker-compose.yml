services:
  postgres:
    image: postgres:18.3-bookworm
    container_name: postgres_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: docker_demo_db
    volumes:
      - pgdata:/var/lib/postgresql
    ports:
      - "5432:5432"
  
  backend:
    build: ./backend
    container_name: demo_backend
    environment:
      ASPNETCORE_URLS: http://+:5000
      ConnectionStrings__DefaultConnection: "Host=postgres;Database=docker_demo_db;Username=postgres;Password=postgres"
    depends_on:
      - postgres
  
  frontend:
    build: ./frontend
    container_name: demo_frontend
    depends_on:
      - backend
  
  nginx:
    image: nginx:1.29.5-alpine
    container_name: demo_nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend

volumes:
  pgdata: